<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1024 1024" version="1.1">
  <defs>

    <!--
      Main icon gradient — diagonal from top-right (sparkles) to bottom-center (stand).
      Colour zones roughly match element positions in the 1024×1024 canvas:
        0–15 %   large sparkle  (≈ x:650–780, y:215–345)   → bright gold
        15–30%   small sparkle + hat star                    → amber
        30–50%   hat body + brim  (y:239–460)               → fuchsia→violet
        50–68%   mic arcs + upper capsule  (y:460–570)      → indigo
        68–85%   mic capsule  (y:475–665)                   → sky-blue
        85–100%  stand / base  (y:629–736)                  → light blue
    -->
    <linearGradient id="iconGrad" x1="800" y1="200" x2="460" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="14%"  stop-color="#f59e0b"/>
      <stop offset="28%"  stop-color="#e879f9"/>
      <stop offset="46%"  stop-color="#9333ea"/>
      <stop offset="62%"  stop-color="#6366f1"/>
      <stop offset="80%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>

    <!-- Outer purple glow on the icon shape -->
    <filter id="iconGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feFlood flood-color="var(--icon-glow-color, #a855f7)" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="180" fill="url(#bgGlow)"/>

  <!-- Icon -->
